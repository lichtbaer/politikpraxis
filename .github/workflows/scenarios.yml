name: Scenario Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run Scenario Tests
        run: cd backend && python -m pytest tests/scenarios/ -v --tb=short

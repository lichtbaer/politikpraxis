# Reverse Proxy — TLS, ACME-HTTP-01, API + SPA
# Kanonische URL: https://www.politikpraxis.de (Apex → www)
# Zertifikate: Let's Encrypt (Volume certbot_conf → /etc/letsencrypt)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    client_max_body_size 16m;

    # TLS (Mozilla Intermediate, ca. 2024)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HTTP → kanonisches HTTPS (www) + ACME Challenge
    server {
        listen 80;
        server_name politikpraxis.de www.politikpraxis.de;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://www.politikpraxis.de$request_uri;
        }
    }

    # HTTPS Apex → www
    server {
        listen 443 ssl http2;
        server_name politikpraxis.de;

        ssl_certificate     /etc/letsencrypt/live/politikpraxis.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/politikpraxis.de/privkey.pem;

        return 301 https://www.politikpraxis.de$request_uri;
    }

    # HTTPS — App (kanonischer Host)
    server {
        listen 443 ssl http2;
        server_name www.politikpraxis.de;

        ssl_certificate     /etc/letsencrypt/live/politikpraxis.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/politikpraxis.de/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        # CSP: 'unsafe-inline' in style-src ist notwendig für React-inline-Styles (style={{ }}).
        # Entfernen erfordert Refactoring aller dynamischen Styles auf CSS-Custom-Properties.
        # script-src ist bewusst ohne 'unsafe-inline' — kein XSS via JS möglich.
        add_header Content-Security-Policy "default-src 'self'; font-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # API (FastAPI: Routen unter /api/…)
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA (interner nginx im Frontend-Container: try_files)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

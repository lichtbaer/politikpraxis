name: Balance Check

on:
  push:
    paths:
      - 'backend/app/content/**'
      - 'frontend/src/core/**'
  pull_request:
    paths:
      - 'backend/app/content/**'
      - 'frontend/src/core/**'

jobs:
  balance-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Balance Simulation
        run: cd frontend && npx vitest run src/core/simulation/balanceSim.test.ts --reporter=verbose
        timeout-minutes: 5

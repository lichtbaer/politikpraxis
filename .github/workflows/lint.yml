name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Upgrade build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install backend and lint tools
        run: pip install -r requirements-test.txt

      - name: Ruff check
        run: cd backend && ruff check app tests

      - name: Ruff format (check)
        run: cd backend && ruff format --check app tests

      - name: Mypy
        run: cd backend && mypy app

      - name: Content validation (YAML-Kreuzvalidierung, dateibasiert)
        run: cd backend && python scripts/validate_content.py

      - name: Frontend content drift check (testContent.ts vs. DB/YAML, #244)
        run: cd backend && python scripts/check_frontend_content_drift.py

      - name: pip-audit (dependency security check)
        # PYSEC-2026-1325 (ecdsa/Minerva): no upstream fix; transitive via python-jose.
        # Removal tracked in #253 (migrate to PyJWT).
        run: pip install pip-audit && pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2026-1325

      - name: Bandit (Python security linter — HIGH severity blockiert)
        run: pip install bandit[toml] && cd backend && bandit -r app -c pyproject.toml -ll

  frontend-eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Unit Tests
        run: cd frontend && npm run test

      - name: npm audit (dependency security check)
        run: cd frontend && npm audit --audit-level=critical

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scanning)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source /repo --no-git -v --redact

  container-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile.prod
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile.prod
    steps:
      - uses: actions/checkout@v7

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: politikpraxis-${{ matrix.name }}:scan

      - name: Trivy scan (${{ matrix.name }})
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: politikpraxis-${{ matrix.name }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  api-types-drift:
    # Stellt sicher, dass die generierten FE-API-Typen zum Backend-OpenAPI-Schema
    # passen (Issue #227, Typ-Contract). Drift lässt den Build fehlschlagen.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install backend (für OpenAPI-Export)
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Check API types are in sync with backend schema
        run: cd frontend && npm run check:api-types

  alembic-migrations:
    # Issue #255: verhindert erneute parallele Alembic-Heads und stellt sicher,
    # dass die komplette Migrationshistorie gegen eine leere DB durchläuft.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bundesrepublik_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DEBUG: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/bundesrepublik_ci
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install backend
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r backend/requirements.txt

      - name: Check for a single Alembic head
        run: |
          cd backend
          heads="$(alembic heads)"
          echo "$heads"
          head_count="$(echo "$heads" | grep -c .)"
          if [ "$head_count" -ne 1 ]; then
            echo "::error::Erwartet genau einen Alembic-Head, gefunden: $head_count. Siehe docs/entwicklung/db-migrationen.md"
            exit 1
          fi

      - name: Upgrade empty DB to head
        run: cd backend && alembic upgrade head

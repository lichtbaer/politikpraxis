name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install backend and lint tools
        run: pip install -r requirements-test.txt

      - name: Ruff check
        run: cd backend && ruff check app tests

      - name: Ruff format (check)
        run: cd backend && ruff format --check app tests

      - name: Mypy
        run: cd backend && mypy app

      - name: pip-audit (dependency security check)
        run: pip install pip-audit && pip-audit -r backend/requirements.txt

      - name: Bandit (Python security linter — HIGH severity blockiert)
        run: pip install bandit[toml] && cd backend && bandit -r app -c pyproject.toml -ll

  frontend-eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: Unit Tests
        run: cd frontend && npm run test

      - name: npm audit (dependency security check)
        run: cd frontend && npm audit --audit-level=critical
